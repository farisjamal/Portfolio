<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117"/>
      <stop offset="100%" style="stop-color:#1f0000"/>
    </linearGradient>
    <linearGradient id="kali" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f1f2e"/>
      <stop offset="100%" style="stop-color:#2d1f3d"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg4)"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="800" height="48" fill="#0f0000" rx="0"/>
  <circle cx="28" cy="24" r="10" fill="#ef4444"/>
  <text x="46" y="29" font-family="monospace" font-size="14" font-weight="bold" fill="#e2e8f0">Network Security Sandbox</text>
  <rect x="580" y="12" width="100" height="24" rx="12" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1"/>
  <text x="594" y="28" font-family="monospace" font-size="10" fill="#ef4444">VirtualBox Lab</text>
  <rect x="694" y="12" width="88" height="24" rx="12" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1"/>
  <text x="704" y="28" font-family="monospace" font-size="10" fill="#ef4444">Controlled</text>

  <!-- Title label -->
  <text x="30" y="76" font-family="monospace" font-size="11" fill="#6b7280">NETWORK TOPOLOGY</text>

  <!-- VM: Kali Linux (attacker) - left -->
  <rect x="30" y="90" width="170" height="130" rx="10" fill="url(#kali)" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="30" y="90" width="170" height="28" rx="10" fill="#8b5cf6" opacity="0.3"/>
  <text x="42" y="109" font-family="monospace" font-size="11" font-weight="bold" fill="#c4b5fd">Kali Linux</text>
  <rect x="168" y="95" width="22" height="14" rx="3" fill="#ef4444" opacity="0.8"/>
  <text x="172" y="106" font-family="monospace" font-size="8" fill="#fff">ATK</text>

  <!-- Kali logo/icon area -->
  <circle cx="115" cy="160" r="28" fill="#2d1f3d" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.5"/>
  <text x="108" y="164" font-family="monospace" font-size="14" fill="#8b5cf6">K</text>

  <text x="42" y="196" font-family="monospace" font-size="9" fill="#8b5cf6">Tools:</text>
  <text x="42" y="210" font-family="monospace" font-size="8" fill="#c4b5fd">• Nmap  • Hydra</text>

  <!-- VM: Windows 7 (target 1) - top right -->
  <rect x="530" y="90" width="170" height="130" rx="10" fill="#0f1117" stroke="#ef4444" stroke-width="2"/>
  <rect x="530" y="90" width="170" height="28" rx="10" fill="#ef4444" opacity="0.2"/>
  <text x="542" y="109" font-family="monospace" font-size="11" font-weight="bold" fill="#fca5a5">Windows 7</text>
  <rect x="666" y="95" width="24" height="14" rx="3" fill="#ef4444" opacity="0.6"/>
  <text x="669" y="106" font-family="monospace" font-size="8" fill="#fff">TGT</text>

  <!-- Win7 icon -->
  <rect x="560" y="128" width="40" height="28" rx="2" fill="#1e3a5f" opacity="0.8"/>
  <rect x="604" y="128" width="16" height="12" rx="1" fill="#1e6a5f" opacity="0.6"/>
  <rect x="604" y="144" width="16" height="12" rx="1" fill="#5f1e6a" opacity="0.6"/>
  <rect x="560" y="160" width="28" height="12" rx="1" fill="#5f3a1e" opacity="0.6"/>

  <text x="542" y="188" font-family="monospace" font-size="9" fill="#ef4444">Open ports:</text>
  <text x="542" y="202" font-family="monospace" font-size="8" fill="#fca5a5">22, 80, 3389</text>
  <text x="542" y="214" font-family="monospace" font-size="8" fill="#6b7280">via Nmap scan</text>

  <!-- VM: Windows 10 (target 2) - bottom right -->
  <rect x="530" y="290" width="170" height="130" rx="10" fill="#0f1117" stroke="#ef4444" stroke-width="2"/>
  <rect x="530" y="290" width="170" height="28" rx="10" fill="#ef4444" opacity="0.15"/>
  <text x="542" y="309" font-family="monospace" font-size="11" font-weight="bold" fill="#fca5a5">Windows 10</text>
  <rect x="666" y="295" width="24" height="14" rx="3" fill="#ef4444" opacity="0.6"/>
  <text x="669" y="306" font-family="monospace" font-size="8" fill="#fff">TGT</text>

  <!-- Win10 icon -->
  <rect x="560" y="328" width="20" height="20" rx="2" fill="#0078d4" opacity="0.7"/>
  <rect x="584" y="328" width="20" height="20" rx="2" fill="#0078d4" opacity="0.5"/>
  <rect x="560" y="352" width="20" height="20" rx="2" fill="#0078d4" opacity="0.5"/>
  <rect x="584" y="352" width="20" height="20" rx="2" fill="#0078d4" opacity="0.7"/>

  <text x="542" y="388" font-family="monospace" font-size="9" fill="#ef4444">Brute-forced:</text>
  <text x="542" y="402" font-family="monospace" font-size="8" fill="#fca5a5">Hydra SSH attack</text>

  <!-- Network switch / hub in center -->
  <rect x="310" y="230" width="180" height="60" rx="8" fill="#1a1a2e" stroke="#6b7280" stroke-width="1.5"/>
  <text x="350" y="255" font-family="monospace" font-size="11" font-weight="bold" fill="#9ca3af">NETWORK</text>
  <text x="348" y="272" font-family="monospace" font-size="10" fill="#6b7280">192.168.1.0/24</text>
  <!-- Switch ports -->
  <circle cx="330" cy="285" r="4" fill="#6b7280"/>
  <circle cx="350" cy="285" r="4" fill="#6b7280"/>
  <circle cx="370" cy="285" r="4" fill="#6b7280"/>
  <circle cx="390" cy="285" r="4" fill="#6b7280"/>
  <circle cx="410" cy="285" r="4" fill="#6b7280"/>
  <circle cx="430" cy="285" r="4" fill="#6b7280"/>
  <circle cx="450" cy="285" r="4" fill="#6b7280"/>

  <!-- Connection lines -->
  <!-- Kali to switch -->
  <line x1="200" y1="190" x2="310" y2="255" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="8,4"/>
  <!-- Switch to Win7 -->
  <line x1="490" y1="245" x2="530" y2="170" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- Switch to Win10 -->
  <line x1="490" y1="265" x2="530" y2="345" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Attack arrows from Kali to targets -->
  <line x1="205" y1="150" x2="525" y2="140" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)" opacity="0.7"/>
  <line x1="205" y1="175" x2="525" y2="340" stroke="#ef4444" stroke-width="2" opacity="0.5"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Attack labels on arrows -->
  <rect x="290" y="120" width="100" height="16" rx="4" fill="#1f0000"/>
  <text x="296" y="132" font-family="monospace" font-size="8" fill="#ef4444">Nmap scan →</text>
  <rect x="260" y="256" width="90" height="16" rx="4" fill="#1f0000"/>
  <text x="265" y="268" font-family="monospace" font-size="8" fill="#ef4444">Hydra brute →</text>

  <!-- Bottom tools panel -->
  <rect x="30" y="290" width="260" height="130" rx="10" fill="#0f0000" stroke="#ef4444" stroke-width="1" stroke-opacity="0.4"/>
  <text x="46" y="314" font-family="monospace" font-size="11" font-weight="bold" fill="#e2e8f0">Tools Used</text>

  <rect x="42" y="322" width="56" height="20" rx="4" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1"/>
  <text x="52" y="336" font-family="monospace" font-size="9" fill="#ef4444">Nmap</text>
  <rect x="106" y="322" width="56" height="20" rx="4" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1"/>
  <text x="114" y="336" font-family="monospace" font-size="9" fill="#c4b5fd">Hydra</text>
  <rect x="170" y="322" width="96" height="20" rx="4" fill="#374151" opacity="0.5"/>
  <text x="176" y="336" font-family="monospace" font-size="9" fill="#9ca3af">VirtualBox</text>

  <text x="46" y="362" font-family="monospace" font-size="9" fill="#9ca3af">• Port enumeration &amp; OS fingerprinting</text>
  <text x="46" y="378" font-family="monospace" font-size="9" fill="#9ca3af">• Credential brute-force attacks</text>
  <text x="46" y="394" font-family="monospace" font-size="9" fill="#9ca3af">• 3 attack simulations documented</text>
  <text x="46" y="410" font-family="monospace" font-size="8" fill="#6b7280">Countermeasures proposed for each vector</text>
</svg>
