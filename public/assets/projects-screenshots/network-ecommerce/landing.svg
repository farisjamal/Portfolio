<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117"/>
      <stop offset="100%" style="stop-color:#0d0020"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg6)"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="800" height="48" fill="#0a0014" rx="0"/>
  <circle cx="28" cy="24" r="10" fill="#8b5cf6"/>
  <text x="46" y="29" font-family="monospace" font-size="14" font-weight="bold" fill="#e2e8f0">Network Design — E-Commerce</text>
  <rect x="560" y="12" width="106" height="24" rx="12" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1"/>
  <text x="574" y="28" font-family="monospace" font-size="10" fill="#a78bfa">Cisco ASA 5505</text>
  <rect x="678" y="12" width="104" height="24" rx="12" fill="#7c3aed" opacity="0.15" stroke="#7c3aed" stroke-width="1"/>
  <text x="690" y="28" font-family="monospace" font-size="10" fill="#a78bfa">VLAN Segmented</text>

  <!-- Zone labels -->
  <text x="50" y="70" font-family="monospace" font-size="10" font-weight="bold" fill="#ef4444" text-anchor="middle">OUTSIDE</text>
  <text x="50" y="84" font-family="monospace" font-size="8" fill="#6b7280" text-anchor="middle">Untrusted</text>

  <text x="400" y="70" font-family="monospace" font-size="10" font-weight="bold" fill="#f59e0b" text-anchor="middle">DMZ</text>
  <text x="400" y="84" font-family="monospace" font-size="8" fill="#6b7280" text-anchor="middle">Semi-trusted</text>

  <text x="750" y="70" font-family="monospace" font-size="10" font-weight="bold" fill="#10b981" text-anchor="middle">INTERNAL LAN</text>
  <text x="750" y="84" font-family="monospace" font-size="8" fill="#6b7280" text-anchor="middle">Trusted</text>

  <!-- Zone backgrounds -->
  <rect x="10" y="90" width="150" height="300" rx="10" fill="#1f0000" opacity="0.4" stroke="#ef4444" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="310" y="90" width="180" height="300" rx="10" fill="#1a1200" opacity="0.4" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="640" y="90" width="150" height="300" rx="10" fill="#001a0d" opacity="0.4" stroke="#10b981" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Outside zone: Internet cloud icon -->
  <ellipse cx="85" cy="155" rx="50" ry="30" fill="#2d0000" stroke="#ef4444" stroke-width="1.5" stroke-opacity="0.6"/>
  <ellipse cx="60" cy="165" rx="30" ry="20" fill="#2d0000" stroke="#ef4444" stroke-width="1" stroke-opacity="0.4"/>
  <ellipse cx="110" cy="165" rx="30" ry="20" fill="#2d0000" stroke="#ef4444" stroke-width="1" stroke-opacity="0.4"/>
  <text x="85" y="158" font-family="monospace" font-size="10" fill="#ef4444" text-anchor="middle">Internet</text>
  <text x="85" y="172" font-family="monospace" font-size="8" fill="#9ca3af" text-anchor="middle">External Users</text>

  <!-- HTTP/SMTP allowed label -->
  <rect x="22" y="200" width="126" height="40" rx="6" fill="#1f0000"/>
  <text x="85" y="216" font-family="monospace" font-size="8" fill="#f59e0b" text-anchor="middle">Allowed inbound:</text>
  <text x="85" y="232" font-family="monospace" font-size="9" fill="#e2e8f0" text-anchor="middle">HTTP • SMTP</text>

  <rect x="22" y="250" width="126" height="40" rx="6" fill="#1f0000"/>
  <text x="85" y="266" font-family="monospace" font-size="8" fill="#ef4444" text-anchor="middle">All other ports</text>
  <text x="85" y="280" font-family="monospace" font-size="9" fill="#fca5a5" text-anchor="middle">BLOCKED</text>

  <!-- Firewall: Cisco ASA in center-left -->
  <rect x="172" y="180" width="124" height="100" rx="10" fill="#1a0a2e" stroke="#8b5cf6" stroke-width="2.5"/>
  <rect x="172" y="180" width="124" height="28" rx="10" fill="#8b5cf6" opacity="0.3"/>
  <text x="234" y="199" font-family="monospace" font-size="9" font-weight="bold" fill="#c4b5fd" text-anchor="middle">Cisco ASA 5505</text>
  <!-- ASA icon detail -->
  <rect x="184" y="215" width="100" height="18" rx="3" fill="#0a0014"/>
  <rect x="186" y="217" width="14" height="14" rx="2" fill="#8b5cf6" opacity="0.6"/>
  <rect x="204" y="217" width="14" height="14" rx="2" fill="#8b5cf6" opacity="0.4"/>
  <rect x="222" y="217" width="14" height="14" rx="2" fill="#8b5cf6" opacity="0.6"/>
  <rect x="240" y="217" width="14" height="14" rx="2" fill="#8b5cf6" opacity="0.4"/>
  <rect x="258" y="217" width="14" height="14" rx="2" fill="#8b5cf6" opacity="0.6"/>

  <text x="234" y="250" font-family="monospace" font-size="8" fill="#a78bfa" text-anchor="middle">NAT + ACL + DHCP</text>
  <text x="234" y="262" font-family="monospace" font-size="8" fill="#6b7280" text-anchor="middle">Traffic control</text>

  <!-- Connection: Outside → ASA -->
  <line x1="160" y1="220" x2="172" y2="225" stroke="#ef4444" stroke-width="2"/>
  <polygon points="168,220 168,230 176,225" fill="#ef4444"/>

  <!-- Connection: ASA → DMZ switch -->
  <line x1="296" y1="225" x2="318" y2="225" stroke="#8b5cf6" stroke-width="2"/>
  <polygon points="314,220 314,230 322,225" fill="#8b5cf6"/>

  <!-- DMZ Switch -->
  <rect x="318" y="208" width="164" height="35" rx="6" fill="#1a1200" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="400" y="230" font-family="monospace" font-size="9" fill="#f59e0b" text-anchor="middle">DMZ Switch (VLAN 20)</text>

  <!-- Web Server in DMZ -->
  <rect x="322" y="260" width="74" height="60" rx="8" fill="#1a1200" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="322" y="260" width="74" height="22" rx="8" fill="#f59e0b" opacity="0.2"/>
  <text x="359" y="276" font-family="monospace" font-size="9" fill="#fbbf24" text-anchor="middle">Web Server</text>
  <text x="359" y="290" font-family="monospace" font-size="8" fill="#9ca3af" text-anchor="middle">HTTP :80</text>
  <text x="359" y="302" font-family="monospace" font-size="8" fill="#9ca3af" text-anchor="middle">Public facing</text>
  <rect x="336" y="310" width="46" height="6" rx="3" fill="#f59e0b" opacity="0.4"/>

  <!-- Email Server in DMZ -->
  <rect x="404" y="260" width="74" height="60" rx="8" fill="#1a1200" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="404" y="260" width="74" height="22" rx="8" fill="#f59e0b" opacity="0.2"/>
  <text x="441" y="276" font-family="monospace" font-size="9" fill="#fbbf24" text-anchor="middle">Email Server</text>
  <text x="441" y="290" font-family="monospace" font-size="8" fill="#9ca3af" text-anchor="middle">SMTP :25</text>
  <text x="441" y="302" font-family="monospace" font-size="8" fill="#9ca3af" text-anchor="middle">Public facing</text>
  <rect x="418" y="310" width="46" height="6" rx="3" fill="#f59e0b" opacity="0.4"/>

  <!-- Lines: DMZ switch to servers -->
  <line x1="360" y1="243" x2="360" y2="260" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="440" y1="243" x2="440" y2="260" stroke="#f59e0b" stroke-width="1.5"/>

  <!-- Bug badge for email server (VLAN fix) -->
  <rect x="452" y="254" width="40" height="14" rx="4" fill="#ef4444" opacity="0.8"/>
  <text x="456" y="264" font-family="monospace" font-size="7" fill="#fff">Fixed!</text>

  <!-- Connection: ASA → Internal -->
  <line x1="296" y1="240" x2="648" y2="240" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="644,235 644,245 652,240" fill="#10b981"/>

  <!-- Internal LAN switch -->
  <rect x="650" y="208" width="128" height="35" rx="6" fill="#001a0d" stroke="#10b981" stroke-width="1.5"/>
  <text x="714" y="230" font-family="monospace" font-size="9" fill="#10b981" text-anchor="middle">LAN Switch (VLAN 10)</text>

  <!-- Clients in LAN -->
  <rect x="654" y="262" width="50" height="50" rx="6" fill="#001a0d" stroke="#10b981" stroke-width="1"/>
  <!-- Client monitor icon -->
  <rect x="660" y="268" width="38" height="24" rx="2" fill="#052e16"/>
  <rect x="674" y="292" width="10" height="4" rx="1" fill="#10b981" opacity="0.5"/>
  <rect x="662" y="298" width="34" height="4" rx="2" fill="#374151"/>
  <text x="679" y="308" font-family="monospace" font-size="7" fill="#10b981" text-anchor="middle">PC-1</text>

  <rect x="716" y="262" width="50" height="50" rx="6" fill="#001a0d" stroke="#10b981" stroke-width="1"/>
  <rect x="722" y="268" width="38" height="24" rx="2" fill="#052e16"/>
  <rect x="736" y="292" width="10" height="4" rx="1" fill="#10b981" opacity="0.5"/>
  <rect x="724" y="298" width="34" height="4" rx="2" fill="#374151"/>
  <text x="741" y="308" font-family="monospace" font-size="7" fill="#10b981" text-anchor="middle">PC-2</text>

  <!-- Lines: LAN switch to clients -->
  <line x1="680" y1="243" x2="680" y2="262" stroke="#10b981" stroke-width="1.5"/>
  <line x1="742" y1="243" x2="742" y2="262" stroke="#10b981" stroke-width="1.5"/>

  <!-- Internal access label -->
  <rect x="652" y="326" width="128" height="40" rx="6" fill="#001a0d"/>
  <text x="716" y="342" font-family="monospace" font-size="8" fill="#10b981" text-anchor="middle">Internal traffic only</text>
  <text x="716" y="358" font-family="monospace" font-size="8" fill="#6b7280" text-anchor="middle">Not exposed externally</text>

  <!-- Bottom info strip -->
  <rect x="10" y="400" width="780" height="1" fill="#374151" opacity="0.5"/>
  <text x="20" y="420" font-family="monospace" font-size="9" fill="#6b7280">Cisco Packet Tracer  •  ASA 5505 Firewall  •  VLAN Segmentation  •  NAT + ACLs  •  ICMP/HTTP/SMTP tested</text>
  <rect x="630" y="408" width="156" height="18" rx="9" fill="#7c3aed" opacity="0.2"/>
  <text x="645" y="420" font-family="monospace" font-size="8" fill="#a78bfa">VLAN misconfiguration fixed</text>
</svg>
