<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117"/>
      <stop offset="100%" style="stop-color:#001630"/>
    </linearGradient>
    <linearGradient id="blueBar" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="redBar" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#991b1b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg5)"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="800" height="48" fill="#000d1f" rx="0"/>
  <circle cx="28" cy="24" r="10" fill="#3b82f6"/>
  <text x="46" y="29" font-family="monospace" font-size="14" font-weight="bold" fill="#e2e8f0">DDoS Mitigation Dashboard</text>
  <circle cx="640" cy="24" r="5" fill="#10b981"/>
  <text x="652" y="28" font-family="monospace" font-size="10" fill="#10b981">System Online</text>
  <text x="726" y="28" font-family="monospace" font-size="10" fill="#6b7280">99.9% uptime</text>

  <!-- Traffic chart: top left -->
  <rect x="20" y="64" width="380" height="190" rx="10" fill="#000d1f" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.4"/>
  <text x="36" y="86" font-family="monospace" font-size="11" font-weight="bold" fill="#e2e8f0">Traffic Monitor</text>
  <text x="36" y="100" font-family="monospace" font-size="9" fill="#6b7280">Allowed vs Blocked  (last 60s)</text>

  <!-- Legend -->
  <rect x="220" y="80" width="10" height="10" rx="2" fill="#3b82f6"/>
  <text x="234" y="90" font-family="monospace" font-size="9" fill="#9ca3af">Allowed</text>
  <rect x="290" y="80" width="10" height="10" rx="2" fill="#ef4444"/>
  <text x="304" y="90" font-family="monospace" font-size="9" fill="#9ca3af">Blocked</text>

  <!-- Y-axis labels -->
  <text x="24" y="118" font-family="monospace" font-size="8" fill="#4b5563">100</text>
  <text x="28" y="148" font-family="monospace" font-size="8" fill="#4b5563">75</text>
  <text x="28" y="178" font-family="monospace" font-size="8" fill="#4b5563">50</text>
  <text x="28" y="208" font-family="monospace" font-size="8" fill="#4b5563">25</text>
  <text x="32" y="238" font-family="monospace" font-size="8" fill="#4b5563">0</text>

  <!-- Chart bars (allowed = blue, blocked = red, side by side) -->
  <!-- T1 -->
  <rect x="56" y="168" width="10" height="68" fill="#3b82f6" opacity="0.7"/>
  <rect x="68" y="188" width="10" height="48" fill="#ef4444" opacity="0.6"/>
  <!-- T2 -->
  <rect x="88" y="148" width="10" height="88" fill="#3b82f6" opacity="0.7"/>
  <rect x="100" y="198" width="10" height="38" fill="#ef4444" opacity="0.6"/>
  <!-- T3 DDoS spike -->
  <rect x="120" y="118" width="10" height="118" fill="#3b82f6" opacity="0.5"/>
  <rect x="132" y="118" width="10" height="118" fill="#ef4444" opacity="0.9"/>
  <text x="118" y="114" font-family="monospace" font-size="7" fill="#ef4444">DDoS!</text>
  <!-- T4 mitigated -->
  <rect x="152" y="158" width="10" height="78" fill="#3b82f6" opacity="0.7"/>
  <rect x="164" y="208" width="10" height="28" fill="#ef4444" opacity="0.7"/>
  <!-- T5 -->
  <rect x="184" y="148" width="10" height="88" fill="#3b82f6" opacity="0.7"/>
  <rect x="196" y="218" width="10" height="18" fill="#ef4444" opacity="0.5"/>
  <!-- T6 -->
  <rect x="216" y="138" width="10" height="98" fill="#3b82f6" opacity="0.7"/>
  <rect x="228" y="218" width="10" height="18" fill="#ef4444" opacity="0.5"/>
  <!-- T7 -->
  <rect x="248" y="155" width="10" height="81" fill="#3b82f6" opacity="0.7"/>
  <rect x="260" y="215" width="10" height="21" fill="#ef4444" opacity="0.5"/>
  <!-- T8 -->
  <rect x="280" y="145" width="10" height="91" fill="#3b82f6" opacity="0.7"/>
  <rect x="292" y="212" width="10" height="24" fill="#ef4444" opacity="0.5"/>
  <!-- T9 -->
  <rect x="312" y="135" width="10" height="101" fill="#3b82f6" opacity="0.7"/>
  <rect x="324" y="220" width="10" height="16" fill="#ef4444" opacity="0.4"/>
  <!-- T10 -->
  <rect x="344" y="142" width="10" height="94" fill="#3b82f6" opacity="0.7"/>
  <rect x="356" y="218" width="10" height="18" fill="#ef4444" opacity="0.4"/>

  <!-- Baseline -->
  <line x1="48" y1="236" x2="384" y2="236" stroke="#374151" stroke-width="1"/>
  <text x="36" y="248" font-family="monospace" font-size="8" fill="#6b7280">WAF activated at T3 — attack blocked within 2s</text>

  <!-- Stats row bottom left -->
  <rect x="20" y="266" width="180" height="70" rx="8" fill="#000d1f" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.4"/>
  <text x="36" y="286" font-family="monospace" font-size="9" fill="#9ca3af">Requests Blocked</text>
  <text x="36" y="314" font-family="monospace" font-size="22" font-weight="bold" fill="#ef4444">1,248</text>
  <text x="36" y="330" font-family="monospace" font-size="8" fill="#6b7280">SQL inject + XSS filtered</text>

  <rect x="210" y="266" width="190" height="70" rx="8" fill="#000d1f" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.4"/>
  <text x="226" y="286" font-family="monospace" font-size="9" fill="#9ca3af">Uptime Since Failover</text>
  <text x="226" y="314" font-family="monospace" font-size="22" font-weight="bold" fill="#10b981">100%</text>
  <text x="226" y="330" font-family="monospace" font-size="8" fill="#6b7280">Dual-server redundancy active</text>

  <!-- Architecture diagram right side -->
  <rect x="420" y="64" width="360" height="310" rx="10" fill="#000d1f" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
  <text x="436" y="86" font-family="monospace" font-size="11" font-weight="bold" fill="#e2e8f0">Infrastructure Architecture</text>

  <!-- Internet (attackers) at top -->
  <rect x="540" y="98" width="120" height="30" rx="6" fill="#1f0000" stroke="#ef4444" stroke-width="1"/>
  <text x="563" y="118" font-family="monospace" font-size="10" fill="#ef4444">Internet / Attackers</text>

  <!-- Arrows going down -->
  <line x1="600" y1="128" x2="600" y2="148" stroke="#ef4444" stroke-width="2"/>
  <polygon points="595,148 605,148 600,156" fill="#ef4444"/>

  <!-- WAF box -->
  <rect x="520" y="158" width="160" height="40" rx="8" fill="#001630" stroke="#3b82f6" stroke-width="2"/>
  <text x="557" y="174" font-family="monospace" font-size="10" font-weight="bold" fill="#3b82f6">WAF Proxy Layer</text>
  <text x="544" y="188" font-family="monospace" font-size="8" fill="#6b7280">SQL Inject + XSS filter</text>

  <!-- Arrow down from WAF -->
  <line x1="600" y1="198" x2="600" y2="220" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="595,220 605,220 600,228" fill="#3b82f6"/>

  <!-- Load Balancer -->
  <rect x="520" y="228" width="160" height="36" rx="8" fill="#001630" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="546" y="248" font-family="monospace" font-size="10" font-weight="bold" fill="#60a5fa">Load Balancer</text>
  <text x="548" y="260" font-family="monospace" font-size="8" fill="#6b7280">Round-robin distribution</text>

  <!-- Arrows to servers -->
  <line x1="560" y1="264" x2="480" y2="300" stroke="#60a5fa" stroke-width="1.5"/>
  <line x1="640" y1="264" x2="720" y2="300" stroke="#60a5fa" stroke-width="1.5"/>

  <!-- Server A -->
  <rect x="436" y="300" width="100" height="50" rx="8" fill="#001630" stroke="#10b981" stroke-width="1.5"/>
  <circle cx="486" cy="315" r="5" fill="#10b981"/>
  <text x="455" y="333" font-family="monospace" font-size="10" fill="#10b981" font-weight="bold">Server A</text>
  <text x="449" y="344" font-family="monospace" font-size="8" fill="#6b7280">Active (Primary)</text>

  <!-- Server B -->
  <rect x="664" y="300" width="100" height="50" rx="8" fill="#001630" stroke="#10b981" stroke-width="1.5"/>
  <circle cx="714" cy="315" r="5" fill="#10b981"/>
  <text x="683" y="333" font-family="monospace" font-size="10" fill="#10b981" font-weight="bold">Server B</text>
  <text x="675" y="344" font-family="monospace" font-size="8" fill="#6b7280">Active (Failover)</text>

  <!-- Sync arrow between servers -->
  <line x1="536" y1="325" x2="664" y2="325" stroke="#374151" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="570" y="320" font-family="monospace" font-size="8" fill="#6b7280">Sync</text>

  <!-- Bottom bar -->
  <rect x="20" y="350" width="760" height="1" fill="#1e3a5f" opacity="0.5"/>
  <text x="20" y="370" font-family="monospace" font-size="9" fill="#6b7280">WAF  •  Load Balancing  •  Dual-Server Failover  •  Real-Time Traffic Monitoring</text>
  <text x="20" y="388" font-family="monospace" font-size="9" fill="#3b82f6">99.9% availability  •  Sub-2s DDoS response  •  SQL Injection + XSS blocked</text>
</svg>
